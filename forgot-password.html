<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .fp-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; background: var(--warm-bg); }
    .fp-card { width: 100%; max-width: 420px; }
    .fp-logo { font-family: var(--font-serif); font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase; display: block; text-align: center; margin-bottom: 48px; color: var(--charcoal); }
    .fp-eyebrow { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--muted); display: block; margin-bottom: 8px; text-align: center; }
    .fp-title { font-family: var(--font-serif); font-size: 28px; font-weight: 500; text-align: center; margin-bottom: 8px; }
    .fp-sub { font-family: var(--font-sans); font-size: 13px; color: var(--muted); text-align: center; line-height: 1.65; margin-bottom: 32px; }
    .fp-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .fp-field label { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--charcoal); }
    .fp-field input { border: 1px solid var(--border); background: #fff; padding: 12px 14px; font-family: var(--font-sans); font-size: 14px; color: var(--charcoal); outline: none; border-radius: 0; }
    .fp-field input:focus { border-color: var(--charcoal); }
    .fp-btn { width: 100%; background: var(--charcoal); color: #fff; border: none; padding: 14px; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .fp-btn:hover { opacity: 0.85; }
    .fp-back { display: block; text-align: center; margin-top: 20px; font-family: var(--font-sans); font-size: 11px; color: var(--muted); }
    .fp-back a { color: var(--charcoal); }
    .fp-success { display: none; text-align: center; padding: 24px 0; }
    .fp-success__icon { font-size: 32px; margin-bottom: 12px; }
    .fp-success__text { font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--charcoal); margin-bottom: 8px; }
    .fp-success__sub { font-family: var(--font-sans); font-size: 13px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="fp-wrap">
    <div class="fp-card">
      <a href="/" class="fp-logo">Atelier</a>
      <em class="fp-eyebrow">Account</em>
      <h1 class="fp-title">Reset your password.</h1>
      <p class="fp-sub">Enter the email address on your account and we'll send a reset link.</p>

      <form id="fp-form" novalidate>
        <div class="fp-field">
          <label for="fp-email">Email address</label>
          <input type="email" id="fp-email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <button class="fp-btn" type="submit">Send reset link</button>
      </form>

      <div class="fp-success" id="fp-success">
        <div class="fp-success__icon">✉️</div>
        <p class="fp-success__text">Check your inbox.</p>
        <p class="fp-success__sub">If an account exists for that address, you'll receive a reset link shortly.</p>
      </div>

      <p class="fp-back"><a href="/">Return to the Atelier</a></p>
    </div>
  </div>
  <script>
    document.getElementById('fp-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('fp-email').value.trim();
      if (!email) { document.getElementById('fp-email').focus(); return; }
      document.getElementById('fp-form').style.opacity = '0';
      document.getElementById('fp-form').style.transition = 'opacity 0.3s';
      setTimeout(function() {
        document.getElementById('fp-form').style.display = 'none';
        document.getElementById('fp-success').style.display = 'block';
      }, 320);
    });
  </script>
</body>
</html>
